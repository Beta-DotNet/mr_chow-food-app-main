{% extends 'base.html' %}

{% block title %}{{ product.name }} | MR CHOW{% endblock %}

{% block content %}
    <div class="product-detail">
        <div class="detail-image" style="background-image: url('{{ product.image_url|default:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80' }}');"></div>
        <div class="detail-info">
            <h1 class="detail-title">{{ product.name }}</h1>
            <p class="detail-price">${{ product.price }}</p>
            <p class="detail-desc">{{ product.description }}</p>
            
            <div style="display: flex; gap: 1rem;">
                <form action="{% url 'add_to_cart' product.id %}" method="post" style="flex: 1;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.2rem; padding: 1rem;">Add to Cart</button>
                </form>
                <a href="{% url 'home' %}" class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">Back to Store</a>
            </div>
        </div>
    </div>
{% endblock %}
